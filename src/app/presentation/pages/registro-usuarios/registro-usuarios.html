<div class="page-container">

  <header class="main-header">
    <div class="header-logo">
      <span class="logo-text">InformedCommunity <span class="badge">Admin</span></span>
    </div>
    <button class="logout-btn" (click)="cerrarSesion()">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="logout-icon">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75" />
      </svg>
      <span>Cerrar Sesión</span>
    </button>
  </header>

  <div class="navigation-bar">
    <button class="back-btn" (click)="volver()">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="back-icon">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
      </svg>
      <span>Volver al Panel</span>
    </button>
  </div>

  <div class="intro">
    <h1>Registro de Usuarios</h1>
    <p>Crea una nueva cuenta de usuario en la plataforma.</p>
  </div>

  <div class="form-card">

    <form [formGroup]="form">

      <div class="form-row">

        <div class="form-group">
          <label>Nombre</label>
          <input type="text" formControlName="nombre" placeholder="Nombre"
            [class.input-error]="form.get('nombre')?.invalid && form.get('nombre')?.touched">
        </div>

        <div class="form-group">
          <label>Apellidos</label>
          <input type="text" formControlName="apellidos" placeholder="Apellidos"
            [class.input-error]="form.get('apellidos')?.invalid && form.get('apellidos')?.touched">
        </div>

      </div>

      <div class="form-group">
        <label>Correo</label>
        <input type="email" formControlName="correo" placeholder="correo@ejemplo.com"
          [class.input-error]="form.get('correo')?.invalid && form.get('correo')?.touched">
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" formControlName="password" placeholder="Mínimo 6 caracteres"
          [class.input-error]="form.get('password')?.invalid && form.get('password')?.touched">
      </div>

      <div class="form-group">
        <label>Rol</label>
        <select formControlName="rol">
          <option value="usuario">Usuario</option>
          <option value="admin">Administrador</option>
        </select>
      </div>

      <button type="button" class="submit-button" (click)="registrar()">
        Registrar Usuario
      </button>

    </form>

  </div>

</div>
