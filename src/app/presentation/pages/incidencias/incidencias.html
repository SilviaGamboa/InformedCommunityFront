<div class="page">

  <header class="main-header">
    <div class="header-logo">
      <span class="logo-text">InformedCommunity</span>
    </div>
    <button class="logout-btn" (click)="cerrarSesion()">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="logout-icon">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75" />
      </svg>
      <span>Cerrar Sesión</span>
    </button>
  </header>

  <div class="navigation-bar">
    <button class="back-btn" (click)="volver()">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="back-icon">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
      </svg>
      <span>Volver al inicio</span>
    </button>
  </div> 

  <div class="card">

    <div class="header">
      <h1>Reportar Incidencia</h1>
      <p>Registra cualquier problema dentro de la comunidad para que la administración pueda darle seguimiento.</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="crearIncidencia()">

      <div class="campo">
        <label>Título</label>
        <input type="text" formControlName="titulo" placeholder="Ej. Lámpara dañada">
      </div>

      <div class="campo">
        <label>Descripción</label>
        <textarea rows="6" formControlName="descripcion" placeholder="Describe detalladamente el problema"></textarea>
      </div>

      <!-- Adjuntar imagen -->
      <div class="campo">
        <label>Imagen (opcional)</label>

        <div class="upload-area" *ngIf="!previewUrl" (click)="fileInput.click()">
          <span class="upload-icon">&#128247;</span>
          <p>Haz clic para adjuntar una imagen</p>
          <p class="upload-hint">JPG o PNG · Máx. 5MB</p>
        </div>

        <input #fileInput type="file" accept=".jpg,.jpeg,.png" class="hidden-input" (change)="onArchivoSeleccionado($event)">

        <p class="error-imagen" *ngIf="errorImagen">{{ errorImagen }}</p>

        <div class="preview-container" *ngIf="previewUrl">
          <img [src]="previewUrl" alt="Vista previa" class="preview-img">
          <button type="button" class="quitar-btn" (click)="quitarImagen()">&#10005; Quitar imagen</button>
        </div>
      </div>

      <button class="submit-button" type="submit" [disabled]="form.invalid">
        Reportar Incidencia
      </button>

    </form>

  </div>

</div>
